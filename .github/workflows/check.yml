name: Agent Runtime Guard CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  check:
    name: Checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.allow_failure == true }}

    defaults:
      run:
        shell: bash

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bench_p99_ms: "10"
          - os: windows-latest
            bench_p99_ms: "500"
          - os: macos-latest
            bench_p99_ms: "200"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Status summary
        run: bash scripts/status-summary.sh

      - name: Audit local (scripts + hooks)
        run: bash scripts/audit-local.sh

      - name: Audit examples (prose + GOOD blocks)
        # Exit 1 only if risky patterns found — known false positives allowed via exclusions
        run: |
          bash scripts/audit-examples.sh || {
            echo "audit-examples found matches — review output above."
            exit 1
          }

      - name: Hook integrity check
        run: bash scripts/verify-hooks-integrity.sh

      - name: Run fixtures (classify + hooks + redact)
        run: bash scripts/run-fixtures.sh

      - name: Check registries
        run: bash scripts/check-registries.sh

      - name: Check skills (errors only)
        run: bash scripts/check-skills.sh --errors-only

      - name: Integration smoke test
        run: bash scripts/check-integration-smoke.sh

      - name: Check installation
        run: bash scripts/check-installation.sh

      - name: Check config integration
        run: bash scripts/check-config-integration.sh

      - name: Check runtime core
        run: bash scripts/check-runtime-core.sh

      - name: Check runtime CLI
        run: bash scripts/check-runtime-cli.sh

      - name: Check hook edge cases
        run: bash scripts/check-hook-edge-cases.sh

      - name: Check apply status
        run: bash scripts/check-apply-status.sh

      - name: Check executables
        run: bash scripts/check-executables.sh

      - name: Check setup wizard
        run: bash scripts/check-setup-wizard.sh

      - name: Check wiring docs
        run: bash scripts/check-wiring-docs.sh

      - name: Check superiority evidence
        run: bash scripts/check-superiority-evidence.sh

      - name: Check status docs
        run: bash scripts/check-status-docs.sh

      - name: Check status artifact
        run: bash scripts/check-status-artifact.sh

      - name: Check fixture count
        run: bash scripts/check-fixture-count.sh

      - name: Check harness support
        run: bash scripts/check-harness-support.sh

      - name: Check OWASP coverage
        run: bash scripts/check-owasp-coverage.sh

      - name: Check scenarios
        run: bash scripts/check-scenarios.sh

      - name: Check OpenCode adapter
        run: bash scripts/check-opencode-adapter.sh

      - name: Check OpenClaw adapter
        run: bash scripts/check-openclaw-adapter.sh

      - name: Check zero deps (runtime/)
        run: bash scripts/check-zero-deps.sh

      - name: Check counts
        run: bash scripts/check-counts.sh

      - name: Cross-harness equivalence
        run: bash scripts/check-cross-harness-equivalence.sh

      - name: Decision replay (sample journal CI gate)
        run: |
          HORUS_CONTRACT_ENABLED=0 HORUS_TRAJECTORY_WINDOW_MIN=0 \
          bash scripts/check-decision-replay.sh

      - name: Contract module
        run: bash scripts/check-contract.sh

      - name: Contract schema v2 migration
        run: bash scripts/check-migrate-v1-v2.sh

      - name: Kill-switch (all 13 hooks)
        run: bash scripts/check-kill-switch.sh

      - name: Restore bench baseline
        uses: actions/cache@v4
        with:
          path: artifacts/bench
          key: bench-baseline-${{ matrix.os }}-${{ github.sha }}
          restore-keys: bench-baseline-${{ matrix.os }}-

      - name: Runtime decision bench
        run: HORUS_BENCH_P99_MS=${{ matrix.bench_p99_ms }} bash scripts/bench-runtime-decision.sh

      - name: Save bench baseline
        uses: actions/cache@v4
        if: always()
        with:
          path: artifacts/bench
          key: bench-baseline-${{ matrix.os }}-${{ github.sha }}
